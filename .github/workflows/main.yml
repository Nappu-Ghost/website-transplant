name: Sync to GitLab
on:
  push:
    branches:
      - main  # or 'master' depending on your default branch name

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to GitLab
        run: |
          git remote add gitlab https://YOUR_GITLAB_USERNAME:${{ secrets.GITLAB_TOKEN }}@gitlab.uwe.ac.uk/software-development-group-project/website-transplant.git
          git push gitlab main --force
