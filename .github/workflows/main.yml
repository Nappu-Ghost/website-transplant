name: Sync to GitLab
on:
  push:
    branches:
      - main  # Change to 'master' if needed

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Required to sync all history/tags

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.uwe.ac.uk/software-development-group-project/website-transplant.git
          git push gitlab main --force # Change 'main' to match your branch
