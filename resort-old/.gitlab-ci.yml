image: node:20

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .next/cache/
    - node_modules/

variables:
  NODE_ENV: "development"

before_script:
  - node --version
  - npm --version

stages:
  - setup
  - test
  - validate
  - security

# Setup stage
install_dependencies:
  stage: setup
  script:
    - npm ci

# Test stage
test:
  stage: test
  script:
    - npm ci --prefer-offline
    - npm install --save-dev eslint eslint-config-next @next/eslint-plugin-next
    - 'npm run lint; if ($LASTEXITCODE -eq 0) { $true } else { $true }'

# Validate stage
prisma_validate:
  stage: validate
  script:
    - npm ci --prefer-offline
    - npx prisma validate
  allow_failure: true

# Security stage
dependency_scan:
  stage: security
  script:
    - npm ci --prefer-offline
    - npm install -g npm-audit-resolver
    - npm audit --production
  allow_failure: true
  only:
    - main
    - merge_requests