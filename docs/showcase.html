<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture & Schema Visualizer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Components ---
        
        const Icon = ({ name, className = "w-4 h-4" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const TechPill = ({ name, version, category, icon }) => (
            <div className="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-2xl hover:border-indigo-300 transition-all group shadow-sm">
                <div className="flex items-center gap-3">
                    <div className="p-2.5 rounded-xl bg-slate-50 group-hover:bg-indigo-50 transition-colors border border-slate-100">
                        <Icon name={icon} className="w-5 h-5 text-slate-500 group-hover:text-indigo-600" />
                    </div>
                    <div>
                        <div className="text-xs font-extrabold text-slate-800">{name}</div>
                        <div className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">{category}</div>
                    </div>
                </div>
                <div className="text-[10px] font-mono font-bold text-indigo-600 bg-indigo-50/50 px-2 py-1 rounded-lg border border-indigo-100">
                    {version}
                </div>
            </div>
        );

        const ApiEndpoint = ({ method, path, service, auth = true }) => {
            const methodColor = {
                GET: 'bg-emerald-100 text-emerald-700 border-emerald-200',
                POST: 'bg-blue-100 text-blue-700 border-blue-200',
                PUT: 'bg-amber-100 text-amber-700 border-amber-200',
                DELETE: 'bg-rose-100 text-rose-700 border-rose-200',
            }[method] || 'bg-slate-100 text-slate-700';

            return (
                <div className="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl hover:border-indigo-400 transition-all group shadow-sm">
                    <div className={`px-2 py-1 rounded-lg text-[10px] font-black border ${methodColor} min-w-[58px] text-center shadow-sm`}>
                        {method}
                    </div>
                    <div className="flex-1 overflow-hidden">
                        <div className="text-[11px] font-mono font-bold text-slate-700 truncate tracking-tight">{path}</div>
                        <div className="text-[10px] text-slate-400 font-medium group-hover:text-indigo-600 transition-colors flex items-center gap-1">
                            <Icon name="terminal" className="w-2.5 h-2.5" />
                            {service}
                        </div>
                    </div>
                    {auth ? <Icon name="lock" className="w-3.5 h-3.5 text-indigo-300" /> : <Icon name="globe" className="w-3.5 h-3.5 text-slate-200" />}
                </div>
            );
        };

        const ModelCard = ({ name, fields, base, variant = "default" }) => {
            const styles = {
                default: "bg-slate-50 border-slate-200",
                nested: "bg-indigo-50/30 border-indigo-100",
                highlight: "bg-amber-50/30 border-amber-100"
            }[variant];

            return (
                <div className={`border rounded-xl overflow-hidden flex flex-col hover:shadow-md transition-all ${styles}`}>
                    <div className="bg-white/50 px-4 py-2 border-b flex justify-between items-center">
                        <span className="font-mono text-xs font-bold text-slate-700">{name}</span>
                        {base && <span className="text-[9px] bg-indigo-600 text-white px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter">Pydantic</span>}
                    </div>
                    <div className="p-4">
                        <ul className="space-y-1.5">
                            {fields.map((f, i) => (
                                <li key={i} className="flex justify-between text-[11px] font-mono group">
                                    <span className="text-blue-700 group-hover:text-blue-900 transition-colors">{f.name}</span>
                                    <span className="text-slate-400 italic">{f.type}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('api');

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10">
                    <header className="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-100 text-white">
                                <Icon name="shield-check" className="w-8 h-8" />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">System Map</h1>
                                <p className="text-slate-500 text-sm font-medium">Visualizing <code className="text-indigo-600 font-bold">api-service.ts</code> & <code className="text-indigo-600 font-bold">schemas.py</code></p>
                            </div>
                        </div>
                        <div className="bg-white px-4 py-2 rounded-xl border border-slate-200 flex items-center gap-2.5 shadow-sm self-start md:self-auto">
                            <div className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse" />
                            <span className="text-xs font-black text-slate-700 uppercase">Production v1.2.0</span>
                        </div>
                    </header>

                    <nav className="flex flex-wrap gap-2 mb-10 bg-white/60 p-1.5 rounded-2xl border border-slate-200 w-fit shadow-sm">
                        {[
                            { id: 'api', label: 'Endpoints', icon: 'globe' },
                            { id: 'core', label: 'Schemas', icon: 'database' },
                            { id: 'logic', label: 'Logic', icon: 'code-2' },
                            { id: 'stack', label: 'Stack', icon: 'layers' },
                        ].map((tab) => (
                            <button 
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex items-center gap-2.5 px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider transition-all ${
                                    activeTab === tab.id 
                                    ? 'bg-slate-800 text-white shadow-xl shadow-slate-200' 
                                    : 'text-slate-500 hover:bg-white hover:text-slate-800'
                                }`}
                            >
                                <Icon name={tab.icon} />
                                {tab.label}
                            </button>
                        ))}
                    </nav>

                    <main className="min-h-[500px]">
                        {activeTab === 'api' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-6 flex items-center gap-2">
                                        <Icon name="hotel" /> Accommodations
                                    </h3>
                                    <ApiEndpoint method="GET" path="/hotels" service="hotelService.list()" />
                                    <ApiEndpoint method="POST" path="/hotels" service="hotelService.create()" />
                                    <ApiEndpoint method="PUT" path="/hotels/{id}" service="hotelService.update()" />
                                    <ApiEndpoint method="POST" path="/hotels/{id}/image" service="hotelService.uploadImage()" />
                                    <div className="h-2" />
                                    <ApiEndpoint method="GET" path="/rooms" service="roomService.list()" />
                                    <ApiEndpoint method="POST" path="/rooms" service="roomService.create()" />
                                </div>
                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-black text-purple-500 uppercase tracking-widest mb-6 flex items-center gap-2">
                                        <Icon name="anchor" /> Ferry & Transport
                                    </h3>
                                    <ApiEndpoint method="GET" path="/ferry-schedules" service="ferryService.getSchedules()" />
                                    <ApiEndpoint method="POST" path="/ferry-schedules" service="ferryService.createSchedule()" />
                                    <ApiEndpoint method="POST" path="/ferry-tickets" service="ferryService.createFerryTicket()" />
                                    <div className="h-2" />
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                        <Icon name="settings" /> Settings
                                    </h3>
                                    <ApiEndpoint method="GET" path="/settings/about" service="settingsService.getAboutSettings()" />
                                    <ApiEndpoint method="PUT" path="/settings/about" service="settingsService.updateAboutSettings()" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'core' && (
                            <div className="space-y-10">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <ModelCard name="AboutConfig" variant="nested" base fields={[
                                        { name: "hero", type: "AboutHero" },
                                        { name: "gallery", type: "List[AboutGalleryItem]" },
                                        { name: "stats", type: "AboutStats" },
                                        { name: "team", type: "List[AboutTeamMember]" }
                                    ]} />
                                    <ModelCard name="MapPin" variant="highlight" fields={[
                                        { name: "id", type: "str" },
                                        { name: "name", type: "str" },
                                        { name: "x", type: "float (0-100)" },
                                        { name: "y", type: "float (0-100)" }
                                    ]} />
                                    <ModelCard name="UserBase" base fields={[
                                        { name: "email", type: "EmailStr" },
                                        { name: "role", type: "RoleEnum" },
                                        { name: "status", type: "StatusEnum" }
                                    ]} />
                                </div>
                            </div>
                        )}

                        {activeTab === 'logic' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800">
                                    <div className="flex items-center justify-between mb-4">
                                        <span className="text-xs font-black text-indigo-400 uppercase tracking-widest">Password Validation</span>
                                        <Icon name="shield-alert" className="text-rose-500 w-4 h-4" />
                                    </div>
                                    <pre className="text-[11px] font-mono text-slate-300 leading-relaxed overflow-x-auto">
                                        <code>{`def _validate_password_strength(pw, email):
  if len(pw) < 12:
    raise ValueError("12+ chars required")
  
  classes = 0
  classes += 1 if any(c.islower() for c in pw)
  classes += 1 if any(c.isupper() for c in pw)
  classes += 1 if any(c.isdigit() for c in pw)
  
  if classes < 3:
    raise ValueError("Weak complexity")`}</code>
                                    </pre>
                                </div>
                                <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                                    <h4 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">CMS Components Map</h4>
                                    <div className="space-y-2">
                                        {['AboutHero', 'AboutStatItem', 'AboutTeamMember', 'MapPinImage'].map(comp => (
                                            <div key={comp} className="flex justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <span className="text-xs font-bold text-slate-700">{comp}</span>
                                                <span className="text-[10px] font-mono text-indigo-500">schemas.py</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'stack' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div className="space-y-6">
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                        <Icon name="server" className="text-blue-500" /> Backend Stack
                                    </h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <TechPill name="FastAPI" version="0.100.0+" category="Web" icon="zap" />
                                        <TechPill name="SQLAlchemy" version="2.0.0+" category="ORM" icon="database" />
                                        <TechPill name="Bcrypt" version="4.0.1" category="Security" icon="lock" />
                                        <TechPill name="Pydantic" version="2.0.0+" category="Schema" icon="check-circle" />
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                        <Icon name="monitor" className="text-slate-900" /> Frontend Stack
                                    </h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <TechPill name="Next.js" version="15.x" category="Framework" icon="box" />
                                        <TechPill name="Tailwind" version="4.0" category="CSS" icon="wind" />
                                        <TechPill name="Lucide" version="latest" category="Icons" icon="image" />
                                        <TechPill name="React" version="18.x" category="Library" icon="code" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 pt-8 border-t border-slate-200 text-center">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                            System Architecture Visualizer • Built for browser
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
